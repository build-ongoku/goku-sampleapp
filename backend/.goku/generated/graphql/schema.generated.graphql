# Types

type Address {
    Line1: String!
    Line2: String
    City: String!
    State: String!
    PostalCode: String!
    Country: Country!
}

type AddressWithMeta {
    ParentID: ID!
    ID: ID!
    Line1: String!
    Line2: String
    City: String!
    State: String!
    PostalCode: String!
    Country: Country!
    CreatedAt: Timestamp!
    UpdatedAt: Timestamp!
    DeletedAt: Timestamp
}

type Auth_AuthenticateResponse {
    Token: String!
}

type Contact {
    Name: PersonName!
    Email: Email!
    Address: Address!
}

type ContactWithMeta {
    ParentID: ID!
    ID: ID!
    Name: PersonNameWithMeta!
    Email: Email!
    Address: AddressWithMeta!
    CreatedAt: Timestamp!
    UpdatedAt: Timestamp!
    DeletedAt: Timestamp
}

type Core_File {
    ID: ID!
    FileName: String!
    StorageClient: Core_File_StorageClient!
    StorageClientIdentifier: String!
    SizeBytes: Int!
    MimeType: String!
    FileHash: String!
    CreatedAt: Timestamp!
    UpdatedAt: Timestamp!
    DeletedAt: Timestamp
}

type Core_JobApplicant {
    ID: ID!
    Name: String!
    UserID: ID!
    ResumeID: ID!
    CreatedAt: Timestamp!
    UpdatedAt: Timestamp!
    DeletedAt: Timestamp
}

type PersonName {
    FirstName: String!
    MiddleInitial: String
    LastName: String!
}

type PersonNameWithMeta {
    ParentID: ID!
    ID: ID!
    FirstName: String!
    MiddleInitial: String
    LastName: String!
    CreatedAt: Timestamp!
    UpdatedAt: Timestamp!
    DeletedAt: Timestamp
}

type PhoneNumber {
    CountryCode: Int!
    Number: String!
    Extension: String
}

type PhoneNumberWithMeta {
    ParentID: ID!
    ID: ID!
    CountryCode: Int!
    Number: String!
    Extension: String
    CreatedAt: Timestamp!
    UpdatedAt: Timestamp!
    DeletedAt: Timestamp
}

type Auth_Secret {
    ID: ID!
    UserID: ID!
    Type: Auth_Secret_Type!
    Secret: String!
    ExpiresAt: Timestamp
    CreatedAt: Timestamp!
    UpdatedAt: Timestamp!
    DeletedAt: Timestamp
}

type User_Team_StandardEntityResponse {
    Object: User_Team!
}

type User_User_StandardEntityResponse {
    Object: User_User!
}

type Auth_Secret_StandardEntityResponse {
